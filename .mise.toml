[tools]
python = "3.14.6"
uv = "latest"

[env]
_.file = ".env"

[tasks.sync]
run = "uv sync"

[tasks.sync-dev]
run = "uv sync --extra dev"

[tasks.agent]
run = "uv run python -m src.agents.orchestrator"

[tasks.api]
run = "uv run uvicorn src.apps.backend.app:app --host 127.0.0.1 --port 8000"

[tasks.ui]
run = "uv run streamlit run src/apps/frontend/chat_ui.py"

[tasks.lint]
run = "uv run ruff check src/"

[tasks.format]
run = "uv run ruff check --fix src/ && uv run ruff format src/"

[tasks.test]
run = "uv run pytest"

[tasks.precommit]
run = "uv run pre-commit run --all-files"